<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Signup</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

        <div class="login-container">

            <div class="login-box">

                <h1>Create Account</h1>

                <p>Join AI Study Assistant</p>

                <form id="signupForm">

                    <div class="input-box">

                        <label>Full Name</label>

                        <input
                            type="text"
                            id="name"
                            placeholder="Enter your Name"
                            required>

                    </div>

                    <div class="input-box">

                        <label>Email</label>

                        <input type="email"
                            id="email"
                            placeholder="Enter Email"
                            required>

                    </div>

                    <div class="input-box">

                        <label>Password</label>

                        <input type="password"
                            id="password"
                            placeholder="Create Password"
                            required>

                    </div>

                    <div class="input-box">

                        <label>Confirm Password</label>

                        <input type="password"
                            id="confirmPassword"
                            placeholder="Confirm Password"
                            required>

                    </div>

                    <button class="login-btn">

                    Create Account

                    </button>

                </form>

                <div class="signup-link">

                    Already have an account?

                    <a href="login.html">

                    Login

                    </a>

                </div>

            </div>

        </div>
    <script src="auth.js"></script>

</body>
</html>
